# Default portfolio configuration
# Tickers and weights are fully customizable.
# Weights must sum to 1.0.

portfolio:
  name: "Default 10-Index Portfolio"

  holdings:
    - ticker: SPY
      label: "US Large-Cap Equities"
      target_weight: 0.10
    - ticker: VB
      label: "US Small/Mid-Cap Equities"
      target_weight: 0.10
    - ticker: VEA
      label: "Developed ex-US Equities"
      target_weight: 0.10
    - ticker: VWO
      label: "Emerging Markets Equities"
      target_weight: 0.10
    - ticker: VNQ
      label: "Global Real Estate"
      target_weight: 0.10
    - ticker: GLD
      label: "Precious Metals/Gold"
      target_weight: 0.10
    - ticker: DBC
      label: "Broad Commodities"
      target_weight: 0.10
    - ticker: XLE
      label: "Energy/Resources"
      target_weight: 0.10
    - ticker: BND
      label: "Bonds/Fixed Income"
      target_weight: 0.10
    - ticker: BIL
      label: "Cash/Short-Term"
      target_weight: 0.10

rebalance:
  # Scheduled rebalance: "2nd_wednesday" is the only supported value for now
  schedule: "2nd_wednesday"

  # Minimum calendar days between any two rebalance events (drift or scheduled)
  min_days_between_rebalances: 7

  drift:
    # Mode: "absolute" (percentage points) or "relative" (fraction of target weight)
    mode: "absolute"
    # Trigger rebalance when any holding drifts beyond this threshold from its target
    threshold: 0.075
